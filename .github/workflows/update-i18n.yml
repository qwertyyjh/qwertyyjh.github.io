name: Update ETF Page Translations

on:
  workflow_dispatch:
  push:
    paths:
      - 'i18n/ko.json'
      - 'i18n/overrides.json'
      - 'scripts/translate-i18n.mjs'
      - '.github/workflows/update-i18n.yml'

permissions:
  contents: write

jobs:
  update-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate translation JSON
        env:
          GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
        run: node scripts/translate-i18n.mjs

      - name: Commit updated translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add i18n/*.json
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "Update ETF page translations"
            git push
          fi
